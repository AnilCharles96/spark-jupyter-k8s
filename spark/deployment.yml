apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-connect
  namespace: spark
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-connect
  template:
    metadata:
      labels:
        app: spark-connect
    spec:
      serviceAccountName: spark
      volumes:
        - name: extra-jars
          emptyDir: {}
        - name: pod-template-vol
          configMap:
            name: spark-pod-template
      initContainers:
        - name: fetch-connect-jar
          image: curlimages/curl:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              curl -L -o /jars/spark-connect_2.13-4.1.2.jar \
                https://repo1.maven.org/maven2/org/apache/spark/spark-connect_2.13/4.1.2/spark-connect_2.13-4.1.2.jar
          volumeMounts:
            - name: extra-jars
              mountPath: /jars
      containers:
        - name: spark-connect
          image: apache/spark:4.1.2
          env:
            - name: HOME
              value: "/tmp"
          ports:
            - containerPort: 15002
            - containerPort: 4040
          volumeMounts:
            - name: extra-jars
              mountPath: /opt/spark/jars-extra
            - name: pod-template-vol
              mountPath: /opt/spark/templates
              readOnly: true
          command: ["/bin/sh", "-c"]
          args:
            - |
              /opt/spark/sbin/start-connect-server.sh \
                --jars /opt/spark/jars-extra/spark-connect_2.13-4.1.2.jar \
                --conf spark.kubernetes.executor.podTemplateFile=/opt/spark/templates/pod-template.yaml \
                --master k8s://https://kubernetes.default.svc:443 \
                --conf spark.kubernetes.namespace=spark \
                --conf spark.kubernetes.authenticate.driver.serviceAccountName=spark \
                --conf spark.kubernetes.container.image=apache/spark:4.1.2 \
                --conf spark.driver.host=spark-connect.spark.svc.cluster.local \
                --conf spark.dynamicAllocation.enabled=true \
                --conf spark.dynamicAllocation.shuffleTracking.enabled=true \
                --conf spark.dynamicAllocation.shuffleTracking.timeout=30s \
                --conf spark.dynamicAllocation.executorIdleTimeout=30s \
                --conf spark.dynamicAllocation.cachedExecutorIdleTimeout=50s \
                --conf spark.dynamicAllocation.minExecutors=0 \
                --conf spark.dynamicAllocation.maxExecutors=8 &&
              sleep infinity